# This file contains the configuration settings for your Redwood app.
# This file is also what makes your Redwood app a Redwood app.
# If you remove it and try to run `yarn rw dev`, you'll get an error.
#
# For the full list of options, see the "App Configuration: redwood.toml" doc:
# https://redwoodjs.com/docs/app-configuration-redwood-toml

[web]
  title = "Redwood App"
  port = 8910
  # Default "/.redwood/functions" assumes a reverse proxy (or Netlify-style
  # rewrite) maps that prefix to the api process. This app instead runs one
  # custom Fastify process (api/src/server.ts) that mounts graphql/functions
  # at bare paths with no prefix — so the built web bundle must call those
  # same bare paths, or every API call 404s / silently hits the SPA fallback.
  apiUrl = ""
  includeEnvironmentVariables = [
    # Add any ENV vars that should be available to the web side to this array
    # See https://redwoodjs.com/docs/environment-variables#web
    "GRAFANA_URL",
  ]
[api]
  port = 8911
[browser]
  open = true
[notifications]
  versionUpdates = ["latest"]
