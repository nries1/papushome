events {}

http {
    include /etc/nginx/mime.types; # This ensures CSS/JS load correctly

    # Docker's internal DNS — re-resolve upstream hostnames every 30s
    resolver 127.0.0.11 valid=30s;

    server {
        listen 80;
        # Allow larger uploads to be proxied to the API (matches UPLOAD_MAX_MB default)
        client_max_body_size 20M;

        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html; # Good for React/Vue routers
        }

        location /api/ {
            set $api http://api:5000;
            proxy_pass $api;
            proxy_set_header Host $host;
            proxy_read_timeout 300;
        }

        location /private/ {
            alias /app/secure-private-storage/;
        }

        location /mqtt {
            set $mqtt http://mqtt-broker:9001;
            proxy_pass $mqtt/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }
    }
}