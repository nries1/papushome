# Define the port for standard MQTT traffic
listener 1883 0.0.0.0

# Define the port for WebSockets (useful for browser-based dashboards)
listener 9001 0.0.0.0
protocol websockets

# Security: Allow connections without a username/password for now
allow_anonymous true

# Persistence: Save messages to disk so they survive a container restart
persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log