<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/papu.ico" />
    <title>System Health | Papu Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-900 text-white font-sans min-h-screen">
    <div class="max-w-6xl mx-auto p-8">
      <div class="flex items-center justify-between mb-8">
        <div>
          <a href="index.html" class="text-slate-400 hover:text-blue-400 text-sm transition">← Back to Home</a>
          <h1 class="text-3xl font-extrabold mt-1 bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-blue-400">
            System Health
          </h1>
        </div>
        <button
          onclick="loadLogs()"
          class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-xl text-sm font-medium transition"
        >
          Refresh
        </button>
      </div>

      <!-- Service health cards -->
      <div class="grid grid-cols-3 gap-4 mb-6">
        <div id="svc-api" class="bg-slate-800/50 border border-slate-700 rounded-2xl p-5 flex flex-col gap-3">
          <div class="flex items-center gap-2">
            <span class="text-[10px] uppercase tracking-widest text-slate-500 font-bold">API</span>
            <div class="ml-auto flex items-center gap-1.5">
              <div class="svc-dot w-2 h-2 rounded-full bg-slate-600 transition-colors duration-300"></div>
              <span class="svc-detail text-[11px] text-slate-500"></span>
            </div>
          </div>
          <div id="api-stats" class="space-y-1.5 text-xs text-slate-600">loading…</div>
        </div>
        <div id="svc-mqtt" class="bg-slate-800/50 border border-slate-700 rounded-2xl p-5 flex flex-col gap-3">
          <div class="flex items-center gap-2">
            <span class="text-[10px] uppercase tracking-widest text-slate-500 font-bold">MQTT Broker</span>
            <div class="ml-auto flex items-center gap-1.5">
              <div class="svc-dot w-2 h-2 rounded-full bg-slate-600 transition-colors duration-300"></div>
              <span class="svc-detail text-[11px] text-slate-500"></span>
            </div>
          </div>
          <div id="mqtt-stats" class="space-y-1.5 text-xs text-slate-600">loading…</div>
        </div>
        <div id="svc-ai" class="bg-slate-800/50 border border-slate-700 rounded-2xl p-5 flex flex-col gap-3">
          <div class="flex items-center gap-2">
            <span class="text-[10px] uppercase tracking-widest text-slate-500 font-bold">AI</span>
            <div class="ml-auto flex items-center gap-1.5">
              <div class="svc-dot w-2 h-2 rounded-full bg-slate-600 transition-colors duration-300"></div>
              <span class="svc-detail text-[11px] text-slate-500"></span>
            </div>
          </div>
          <div id="ai-stats" class="space-y-1.5 text-xs text-slate-600">loading…</div>
        </div>
      </div>

      <!-- Device health card -->
      <div class="bg-slate-800/50 border border-slate-700 rounded-2xl overflow-hidden mb-6">
        <div class="px-5 py-4 border-b border-slate-700 flex items-center justify-between">
          <span class="text-[10px] uppercase tracking-widest text-slate-500 font-bold">Device Health · 7d</span>
        </div>
        <div id="device-health-loading" class="p-6 text-center text-xs text-slate-600">Loading…</div>
        <table id="device-health-table" class="hidden w-full text-xs">
          <thead>
            <tr class="border-b border-slate-700 text-[10px] uppercase tracking-widest text-slate-500">
              <th class="px-5 py-3 text-left">Device</th>
              <th class="px-5 py-3 text-right">Env Readings</th>
              <th class="px-5 py-3 text-right">Tank Readings</th>
              <th class="px-5 py-3 text-right">Watering</th>
              <th class="px-5 py-3 text-right">Dev Errors</th>
            </tr>
          </thead>
          <tbody id="device-health-body"></tbody>
        </table>
        <div id="device-health-empty" class="hidden p-6 text-center text-xs text-slate-600">No devices found.</div>
      </div>

      <!-- System stats widget -->
      <div class="bg-slate-800/50 p-6 rounded-2xl border border-slate-700 flex flex-col space-y-6 mb-6">
        <div>
          <div class="flex justify-between items-end mb-2">
            <div>
              <span class="text-xs text-slate-400 block mb-1">CPU Load</span>
              <span id="cpu-load" class="text-2xl font-mono text-blue-400 leading-none">--%</span>
            </div>
            <div class="text-right">
              <span class="text-[10px] uppercase text-slate-500 font-bold block">Server Temp</span>
              <span id="cpu-temp" class="text-sm font-mono text-emerald-400 bg-emerald-900/30 px-2 py-0.5 rounded">--°C</span>
            </div>
          </div>
          <div class="w-full bg-slate-900 rounded-full h-2 overflow-hidden">
            <div id="cpu-bar" class="bg-blue-500 h-full transition-all duration-500" style="width: 0%"></div>
          </div>
        </div>
        <div>
          <div class="flex justify-between items-end mb-2">
            <span class="text-xs text-slate-400">Memory Usage</span>
            <span id="mem-load" class="text-xl font-mono text-purple-400">--%</span>
          </div>
          <div class="w-full bg-slate-900 rounded-full h-2 overflow-hidden">
            <div id="mem-bar" class="bg-purple-500 h-full transition-all duration-500" style="width: 0%"></div>
          </div>
        </div>
      </div>

      <!-- Filters -->
      <div class="bg-slate-800/50 border border-slate-700 rounded-2xl p-5 mb-6 flex flex-wrap gap-4 items-end">
        <div class="flex flex-col gap-1">
          <label class="text-xs uppercase tracking-widest text-slate-500 font-bold">Log Type</label>
          <select id="filter-type" onchange="loadLogs()" class="bg-slate-900 border border-slate-700 text-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-cyan-500">
            <option value="">All Types</option>
            <option value="api">API</option>
            <option value="app">App</option>
            <option value="device">Hardware</option>
          </select>
        </div>
        <div class="flex flex-col gap-1">
          <label class="text-xs uppercase tracking-widest text-slate-500 font-bold">Level</label>
          <select id="filter-level" onchange="loadLogs()" class="bg-slate-900 border border-slate-700 text-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-cyan-500">
            <option value="">All Levels</option>
            <option value="info">Info</option>
            <option value="warn">Warn</option>
            <option value="error">Error</option>
          </select>
        </div>
        <div class="ml-auto text-xs text-slate-500" id="log-count"></div>
      </div>

      <!-- Log Table -->
      <div class="bg-slate-800/50 border border-slate-700 rounded-2xl overflow-hidden">
        <div id="log-loading" class="p-10 text-center text-slate-500 text-sm">Loading...</div>
        <table id="log-table" class="hidden w-full text-sm">
          <thead>
            <tr class="border-b border-slate-700 text-left text-[10px] uppercase tracking-widest text-slate-500">
              <th class="px-5 py-3">Time</th>
              <th class="px-5 py-3">Type</th>
              <th class="px-5 py-3">Level</th>
              <th class="px-5 py-3">Source</th>
              <th class="px-5 py-3">Message</th>
              <th class="px-3 py-3"></th>
            </tr>
          </thead>
          <tbody id="log-body"></tbody>
        </table>
        <div id="log-empty" class="hidden p-10 text-center text-slate-500 text-sm">No logs found.</div>
      </div>

      <!-- Pagination -->
      <div class="flex justify-between items-center mt-4">
        <button
          id="btn-prev"
          onclick="changePage(-1)"
          disabled
          class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-xl text-sm font-medium transition disabled:opacity-30 disabled:cursor-not-allowed"
        >
          ← Prev
        </button>
        <span id="page-label" class="text-slate-500 text-xs">Page 1</span>
        <button
          id="btn-next"
          onclick="changePage(1)"
          disabled
          class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-xl text-sm font-medium transition disabled:opacity-30 disabled:cursor-not-allowed"
        >
          Next →
        </button>
      </div>
    </div>

    <script>
      const PAGE_SIZE = 50;
      let currentPage = 0;
      let lastCount = 0;

      const typeBadge = {
        api:    'bg-violet-900/60 text-violet-300 border border-violet-700',
        app:    'bg-emerald-900/60 text-emerald-300 border border-emerald-700',
        device: 'bg-cyan-900/60 text-cyan-300 border border-cyan-700',
      };

      const levelBadge = {
        info:  'bg-blue-900/60 text-blue-300 border border-blue-700',
        warn:  'bg-yellow-900/60 text-yellow-300 border border-yellow-700',
        error: 'bg-red-900/60 text-red-300 border border-red-700',
      };

      const typeLabel = { api: 'API', app: 'App', device: 'Hardware' };

      async function loadLogs() {
        currentPage = 0;
        await fetchLogs();
      }

      async function changePage(delta) {
        currentPage = Math.max(0, currentPage + delta);
        await fetchLogs();
      }

      async function fetchLogs() {
        const log_type = document.getElementById('filter-type').value;
        const log_level = document.getElementById('filter-level').value;

        document.getElementById('log-loading').classList.remove('hidden');
        document.getElementById('log-table').classList.add('hidden');
        document.getElementById('log-empty').classList.add('hidden');

        const params = new URLSearchParams({ page: currentPage, rows: PAGE_SIZE });
        if (log_type) params.set('log_type', log_type);
        if (log_level) params.set('log_level', log_level);

        try {
          const res = await fetch('/api/system-logs?' + params.toString());
          const logs = await res.json();
          lastCount = logs.length;
          renderLogs(logs);
        } catch (e) {
          console.error('Failed to load logs', e);
          document.getElementById('log-loading').textContent = 'Failed to load logs.';
        }
      }

      function renderLogs(logs) {
        document.getElementById('log-loading').classList.add('hidden');

        if (logs.length === 0) {
          document.getElementById('log-empty').classList.remove('hidden');
          document.getElementById('log-count').textContent = '';
          updatePagination();
          return;
        }

        const tbody = document.getElementById('log-body');
        tbody.innerHTML = '';

        logs.forEach(log => {
          const hasDetails = log.details != null;
          const tr = document.createElement('tr');
          tr.className = 'border-b border-slate-700/50 hover:bg-slate-700/30 transition' + (hasDetails ? ' cursor-pointer select-none' : '');

          const ts = new Date(log.timestamp);
          const timeStr = ts.toLocaleDateString() + ' ' + ts.toLocaleTimeString();
          const tBadge = typeBadge[log.log_type] || 'bg-slate-700 text-slate-300';
          const lBadge = levelBadge[log.log_level] || 'bg-slate-700 text-slate-300';
          const tLabel = typeLabel[log.log_type] || log.log_type;

          tr.innerHTML = `
            <td class="px-5 py-3 text-slate-400 whitespace-nowrap font-mono text-xs">${timeStr}</td>
            <td class="px-5 py-3 whitespace-nowrap">
              <span class="px-2 py-0.5 rounded-full text-xs font-bold ${tBadge}">${escHtml(tLabel)}</span>
            </td>
            <td class="px-5 py-3 whitespace-nowrap">
              <span class="px-2 py-0.5 rounded-full text-xs font-bold ${lBadge}">${escHtml(log.log_level)}</span>
            </td>
            <td class="px-5 py-3 text-slate-400 whitespace-nowrap text-xs font-mono">${escHtml(log.source ?? '—')}</td>
            <td class="px-5 py-3 text-slate-300">${escHtml(log.message)}</td>
            <td class="px-3 py-3 text-slate-600 text-xs text-right">${hasDetails ? '▶' : ''}</td>
          `;
          tbody.appendChild(tr);

          if (hasDetails) {
            const detailRow = document.createElement('tr');
            detailRow.className = 'hidden border-b border-slate-700/50 bg-slate-950/60';
            detailRow.innerHTML = `
              <td colspan="6" class="px-5 py-4">
                <pre class="text-xs text-slate-300 font-mono whitespace-pre-wrap break-all">${escHtml(JSON.stringify(log.details, null, 2))}</pre>
              </td>
            `;
            tbody.appendChild(detailRow);

            tr.addEventListener('click', () => {
              const isOpen = !detailRow.classList.contains('hidden');
              detailRow.classList.toggle('hidden');
              tr.querySelector('td:last-child').textContent = isOpen ? '▶' : '▼';
            });
          }
        });

        document.getElementById('log-table').classList.remove('hidden');
        document.getElementById('log-count').textContent = `${logs.length} entries`;
        updatePagination();
      }

      function updatePagination() {
        document.getElementById('page-label').textContent = `Page ${currentPage + 1}`;
        document.getElementById('btn-prev').disabled = currentPage === 0;
        document.getElementById('btn-next').disabled = lastCount < PAGE_SIZE;
      }

      function escHtml(str) {
        return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }

      async function updateStats() {
        try {
          const res = await fetch('/api/stats');
          const data = await res.json();
          document.getElementById('cpu-load').innerText = data.cpu + '%';
          document.getElementById('mem-load').innerText = data.mem + '%';
          document.getElementById('cpu-temp').innerText = data.temp + '°C';
          document.getElementById('cpu-bar').style.width = data.cpu + '%';
          document.getElementById('mem-bar').style.width = data.mem + '%';
        } catch (e) {
          console.error('Stats update failed', e);
        }
      }

      const dotColors = { ok: 'bg-emerald-400', stale: 'bg-amber-400', offline: 'bg-red-500' };

      function setServiceTile(id, status, detail) {
        const tile = document.getElementById(id);
        if (!tile) return;
        const dot = tile.querySelector('.svc-dot');
        const detailEl = tile.querySelector('.svc-detail');
        dot.className = 'svc-dot w-2 h-2 rounded-full transition-colors duration-300 ' + (dotColors[status] || 'bg-slate-600');
        detailEl.textContent = detail;
      }

      function formatAge(ms) {
        if (ms === null) return 'never';
        if (ms < 60000) return Math.round(ms / 1000) + 's ago';
        return Math.round(ms / 60000) + 'm ago';
      }

      async function pollHealth() {
        try {
          const res = await fetch('/api/health');
          const h = await res.json();
          setServiceTile('svc-api', h.api === 'ok' ? 'ok' : 'offline', h.api === 'ok' ? 'responding' : 'unreachable');
          setServiceTile('svc-mqtt', h.mqtt === 'ok' ? 'ok' : 'offline', h.mqtt === 'ok' ? 'connected' : 'offline');

          const aiStatus = (h.visionWorker.status === 'ok' || h.publisher.status === 'ok') ? 'ok'
            : (h.visionWorker.status === 'stale' || h.publisher.status === 'stale') ? 'stale'
            : 'offline';
          const workerAge = h.visionWorker.lastSeenMs !== null ? 'worker ' + formatAge(h.visionWorker.lastSeenMs) : null;
          const framesAge = h.publisher.lastSeenMs !== null ? 'frames ' + formatAge(h.publisher.lastSeenMs) : null;
          setServiceTile('svc-ai', aiStatus, [workerAge, framesAge].filter(Boolean).join(' · ') || 'no activity');
        } catch {
          setServiceTile('svc-api', 'offline', 'unreachable');
        }
      }

      function renderApiStats(api) {
        if (!api || api.total === 0) return '<div class="text-slate-600">No requests logged</div>';
        const COLORS  = { '2xx': 'bg-emerald-500', '3xx': 'bg-sky-500', '4xx': 'bg-amber-500', '5xx': 'bg-red-500' };
        const LABELS  = { '2xx': 'text-emerald-400', '3xx': 'text-sky-400', '4xx': 'text-amber-400', '5xx': 'text-red-400' };
        const bars = api.by_bucket.map(b => {
          const pct = (b.count / api.total * 100);
          const barW = Math.max(pct, 0.4).toFixed(1);
          return `<div class="flex items-center gap-2">
            <span class="w-7 font-mono ${LABELS[b.bucket] || 'text-slate-400'}">${b.bucket}</span>
            <div class="flex-1 bg-slate-900 rounded-full h-1.5 overflow-hidden">
              <div class="${COLORS[b.bucket] || 'bg-slate-500'} h-full transition-all" style="width:${barW}%"></div>
            </div>
            <span class="font-mono text-slate-300 w-10 text-right">${pct.toFixed(1)}%</span>
            <span class="font-mono text-slate-500 w-14 text-right">${b.count.toLocaleString()}</span>
          </div>`;
        }).join('');
        return `<div class="text-slate-500 mb-2">${api.total.toLocaleString()} req · 7d</div>${bars}`;
      }

      function renderRateStats(s, label) {
        if (!s || s.total === 0) return `<div class="text-slate-600">No ${label} recorded</div>`;
        const errPct = s.errors / s.total * 100;
        const okW = Math.max(100 - errPct, 0).toFixed(1);
        const healthy = errPct < 5;
        const errCls = healthy ? 'text-slate-400' : 'text-red-400';
        const barCls = healthy ? 'bg-emerald-500' : 'bg-red-500';
        return `<div class="text-slate-500">${s.total.toLocaleString()} ${label} · 7d</div>
          <div class="flex items-center gap-2 mt-1">
            <div class="flex-1 bg-slate-900 rounded-full h-1.5 overflow-hidden">
              <div class="${barCls} h-full transition-all" style="width:${okW}%"></div>
            </div>
            <span class="font-mono ${errCls} shrink-0">${s.errors.toLocaleString()} err · ${errPct.toFixed(1)}%</span>
          </div>`;
      }

      async function loadServiceStats() {
        try {
          const res = await fetch('/api/service-stats');
          const data = await res.json();
          document.getElementById('api-stats').innerHTML  = renderApiStats(data.api);
          document.getElementById('mqtt-stats').innerHTML = renderRateStats(data.mqtt, 'msg');
          document.getElementById('ai-stats').innerHTML   = renderRateStats(data.ai, 'events');
        } catch (e) {
          console.error('Failed to load service stats', e);
        }
      }

      function fmtCount(n) {
        return n > 0 ? n.toLocaleString() : '<span class="text-slate-700">—</span>';
      }

      function renderDeviceHealth(devices) {
        const loading = document.getElementById('device-health-loading');
        const table   = document.getElementById('device-health-table');
        const empty   = document.getElementById('device-health-empty');
        const tbody   = document.getElementById('device-health-body');

        loading.classList.add('hidden');

        if (!devices || !devices.length) {
          empty.classList.remove('hidden');
          return;
        }

        tbody.innerHTML = devices.map(d => {
          const name = escHtml(d.friendly_name || d.device_id);
          const room = d.room_display_name ? `<div class="text-slate-600 mt-0.5">${escHtml(d.room_display_name)}</div>` : '';

          const envCell = fmtCount(d.env_readings_7d);

          const tankCell = fmtCount(d.tank_readings_7d);

          let waterCell;
          if (d.watering_total_7d === 0) {
            waterCell = '<span class="text-slate-700">—</span>';
          } else {
            const errCount = d.watering_errors_7d;
            const complete = d.watering_complete_7d;
            const total    = d.watering_total_7d;
            const blocked  = total - complete - errCount;
            let parts = [`<span class="text-emerald-400">${complete} ok</span>`];
            if (blocked > 0) parts.push(`<span class="text-amber-400">${blocked} blocked</span>`);
            if (errCount  > 0) parts.push(`<span class="text-red-400">${errCount} err</span>`);
            waterCell = parts.join(' · ');
          }

          const errCount = d.device_log_errors_7d;
          const errCell  = errCount > 0
            ? `<span class="text-red-400 font-mono">${errCount}</span>`
            : '<span class="text-slate-600 font-mono">0</span>';

          return `<tr class="border-b border-slate-700/50 hover:bg-slate-700/20 transition">
            <td class="px-5 py-3 text-slate-300">${name}${room}</td>
            <td class="px-5 py-3 text-right font-mono text-slate-300">${envCell}</td>
            <td class="px-5 py-3 text-right font-mono text-slate-300">${tankCell}</td>
            <td class="px-5 py-3 text-right">${waterCell}</td>
            <td class="px-5 py-3 text-right">${errCell}</td>
          </tr>`;
        }).join('');

        table.classList.remove('hidden');
      }

      async function loadDeviceHealth() {
        try {
          const res = await fetch('/api/device-health-stats');
          const data = await res.json();
          renderDeviceHealth(data);
        } catch (e) {
          console.error('Failed to load device health', e);
          document.getElementById('device-health-loading').textContent = 'Failed to load.';
        }
      }

      pollHealth();
      setInterval(pollHealth, 15000);

      loadServiceStats();
      setInterval(loadServiceStats, 60000);

      loadDeviceHealth();
      setInterval(loadDeviceHealth, 60000);

      loadLogs();
      updateStats();
      setInterval(updateStats, 3000);
    </script>
  </body>
</html>
